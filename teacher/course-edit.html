<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create course – Teacher – LearnVault</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .lesson-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .lesson-row:last-child { border-bottom: none; }
    .lesson-drag { color: var(--text-muted); cursor: grab; }
    .lesson-row input { flex: 1; }
    .lesson-row .duration { width: 80px; }
  </style>
</head>
<body>
  <div class="panel-wrap">
    <aside class="panel-sidebar">
      <div class="panel-sidebar-header">
        <a href="index.html" class="logo">Learn<span>Vault</span> <span class="badge">Teacher</span></a>
      </div>
      <nav class="panel-nav">
        <a href="index.html"><span class="icon">📊</span> Dashboard</a>
        <a href="courses.html" class="active"><span class="icon">📚</span> My courses</a>
        <a href="course-edit.html"><span class="icon">➕</span> Create course</a>
        <a href="earnings.html"><span class="icon">💰</span> Earnings & payouts</a>
      </nav>
      <div class="panel-sidebar-footer">
        <a href="../index.html">← Back to site</a>
      </div>
    </aside>
    <div class="panel-backdrop" aria-hidden="true"></div>
    <main class="panel-main">
      <header class="panel-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="panel-menu-btn" type="button" data-panel-menu aria-label="Open menu">☰</button>
          <h1>Create course</h1>
        </div>
        <div class="panel-header-actions">
          <a href="courses.html" class="btn btn-ghost">Cancel</a>
          <button class="btn btn-secondary">Save draft</button>
          <button class="btn btn-primary">Publish</button>
        </div>
      </header>
      <div class="panel-content">
        <div class="panel-card">
          <div class="panel-card-header">
            <h2>Course details</h2>
          </div>
          <div style="padding: 24px;">
            <div class="form-group">
              <label>Course title</label>
              <input type="text" class="form-control" placeholder="e.g. Complete Web Development Bootcamp">
            </div>
            <div class="form-group">
              <label>Short description</label>
              <textarea class="form-control" rows="3" placeholder="What will students learn?"></textarea>
            </div>
            <div class="form-group">
              <label>Thumbnail URL (optional)</label>
              <input type="url" class="form-control" placeholder="https://...">
            </div>
            <div class="card-row">
              <div class="form-group">
                <label>Price ($)</label>
                <input type="number" class="form-control" placeholder="49.99" step="0.01" style="max-width: 140px;">
              </div>
              <div class="form-group">
                <label>Level</label>
                <select class="form-control" style="max-width: 180px;">
                  <option>All levels</option>
                  <option>Beginner</option>
                  <option>Intermediate</option>
                  <option>Advanced</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="panel-card">
          <div class="panel-card-header">
            <h2>Lessons</h2>
            <button class="btn btn-secondary">+ Add lesson</button>
          </div>
          <div style="padding: 24px;">
            <div class="lesson-row">
              <span class="lesson-drag">⋮⋮</span>
              <input type="text" class="form-control" placeholder="Lesson 1: Introduction">
              <input type="text" class="form-control duration" placeholder="12:30">
            </div>
            <div class="lesson-row">
              <span class="lesson-drag">⋮⋮</span>
              <input type="text" class="form-control" placeholder="Lesson 2: Setup">
              <input type="text" class="form-control duration" placeholder="8:00">
            </div>
            <div class="panel-empty" style="padding: 24px;">
              <p style="color: var(--text-muted); font-size: 0.9rem;">Add more lessons with the button above. You can upload videos after saving.</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/panel.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
