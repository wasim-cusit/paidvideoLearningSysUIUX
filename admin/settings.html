<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings – Admin – LearnVault</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="panel-wrap">
    <aside class="panel-sidebar">
      <div class="panel-sidebar-header">
        <a href="index.html" class="logo">Learn<span>Vault</span> <span class="badge">Admin</span></a>
      </div>
      <nav class="panel-nav">
        <div class="panel-nav-section">
          <div class="panel-nav-section-title">Overview</div>
          <a href="index.html"><span class="icon">📊</span> Dashboard</a>
        </div>
        <div class="panel-nav-section">
          <div class="panel-nav-section-title">Manage</div>
          <a href="courses.html"><span class="icon">📚</span> Courses</a>
          <a href="users.html"><span class="icon">👥</span> Users</a>
          <a href="teachers.html"><span class="icon">👨‍🏫</span> Teachers</a>
          <a href="payments.html"><span class="icon">💳</span> Payments</a>
        </div>
        <div class="panel-nav-section">
          <div class="panel-nav-section-title">System</div>
          <a href="settings.html" class="active"><span class="icon">⚙️</span> Settings</a>
        </div>
      </nav>
      <div class="panel-sidebar-footer">
        <a href="../index.html">← Back to site</a>
      </div>
    </aside>
    <div class="panel-backdrop" aria-hidden="true"></div>
    <main class="panel-main">
      <header class="panel-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="panel-menu-btn" type="button" data-panel-menu aria-label="Open menu">☰</button>
          <h1>Settings</h1>
        </div>
      </header>
      <div class="panel-content">
        <div class="panel-card">
          <div class="panel-card-header">
            <h2>General</h2>
          </div>
          <div style="padding: 24px;">
            <div class="form-group">
              <label>Site name</label>
              <input type="text" class="form-control" value="LearnVault">
            </div>
            <div class="form-group">
              <label>Support email</label>
              <input type="email" class="form-control" value="support@learnvault.com">
            </div>
            <div class="form-group">
              <label>Default currency</label>
              <select class="form-control" style="max-width: 200px;">
                <option>USD ($)</option>
                <option>EUR (€)</option>
                <option>GBP (£)</option>
              </select>
            </div>
            <button class="btn btn-primary">Save changes</button>
          </div>
        </div>
        <div class="panel-card">
          <div class="panel-card-header">
            <h2>Payments</h2>
          </div>
          <div style="padding: 24px;">
            <div class="form-group">
              <label>Stripe publishable key</label>
              <input type="text" class="form-control" placeholder="pk_live_...">
            </div>
            <div class="form-group">
              <label>PayPal client ID</label>
              <input type="text" class="form-control" placeholder="Optional">
            </div>
            <div class="form-group">
              <label>Platform fee (%)</label>
              <input type="number" class="form-control" value="10" style="max-width: 120px;">
            </div>
            <button class="btn btn-primary">Save</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/panel.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
