<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit course – Admin – LearnVault</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="panel-wrap">
    <aside class="panel-sidebar">
      <div class="panel-sidebar-header">
        <a href="index.html" class="logo">Learn<span>Vault</span> <span class="badge">Admin</span></a>
      </div>
      <nav class="panel-nav">
        <a href="index.html"><span class="icon">📊</span> Dashboard</a>
        <a href="courses.html" class="active"><span class="icon">📚</span> Courses</a>
        <a href="users.html"><span class="icon">👥</span> Users</a>
        <a href="teachers.html"><span class="icon">👨‍🏫</span> Teachers</a>
        <a href="payments.html"><span class="icon">💳</span> Payments</a>
        <a href="settings.html"><span class="icon">⚙️</span> Settings</a>
      </nav>
      <div class="panel-sidebar-footer">
        <a href="../index.html">← Back to site</a>
      </div>
    </aside>
    <div class="panel-backdrop" aria-hidden="true"></div>
    <main class="panel-main">
      <header class="panel-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="panel-menu-btn" type="button" data-panel-menu aria-label="Open menu">☰</button>
          <h1>Edit course</h1>
        </div>
        <div class="panel-header-actions">
          <a href="courses.html" class="btn btn-ghost">Cancel</a>
          <button class="btn btn-primary" id="save-course">Save course</button>
        </div>
      </header>
      <div class="panel-content">
        <div class="panel-card">
          <div style="padding: 24px;">
            <div class="form-group">
              <label>Course title</label>
              <input type="text" class="form-control" value="Complete Web Development Bootcamp">
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea class="form-control" rows="4" placeholder="Brief description...">Learn HTML, CSS, JavaScript, and modern frameworks.</textarea>
            </div>
            <div class="card-row">
              <div class="form-group">
                <label>Price ($)</label>
                <input type="number" class="form-control" value="49.99" step="0.01" style="max-width: 140px;">
              </div>
              <div class="form-group">
                <label>Teacher</label>
                <select class="form-control" style="max-width: 240px;">
                  <option>Alex Rivera</option>
                  <option>Jordan Lee</option>
                  <option>Sam Chen</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select class="form-control" style="max-width: 160px;">
                <option>Published</option>
                <option>Draft</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/panel.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.getElementById('save-course').addEventListener('click', function() {
      if (window.LearnVaultToast) LearnVaultToast({ title: 'Saved', message: 'Course details updated.', type: 'success' });
    });
  </script>
</body>
</html>
