<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in – LearnVault</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <a href="index.html" class="logo">Learn<span>Vault</span></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
      </nav>
      <div class="header-actions">
        <a href="signup.html" class="btn btn-primary">Sign up</a>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-page">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to access your courses and continue learning.</p>
        <form id="login-form" onsubmit="return false;">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary">Log in</button>
        </form>
        <p class="footer-link">Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </section>
  </main>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('login-form').onsubmit = function() {
      var email = document.getElementById('email').value;
      var pass = document.getElementById('password').value;
      if (!email || !pass) return false;
      window.location.href = 'dashboard.html';
      return false;
    };
  </script>
</body>
</html>
