<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in – LearnVault</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <div class="auth-screen">
    <div class="auth-brand">
      <a href="index.html" class="auth-logo">Learn<span>Vault</span></a>
      <p class="auth-tagline">Learn from the best.<br>Watch. Practice. Master.</p>
      <div class="auth-decoration" aria-hidden="true"></div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to access your courses and continue learning.</p>
        <form id="login-form" onsubmit="return false;">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Log in</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
      <p class="auth-back"><a href="index.html">← Back to home</a></p>
    </div>
  </div>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('login-form').onsubmit = function() {
      var email = document.getElementById('email').value;
      var pass = document.getElementById('password').value;
      if (!email || !pass) return false;
      window.location.href = 'dashboard.html';
      return false;
    };
  </script>
</body>
</html>
